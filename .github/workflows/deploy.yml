name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 Build image with unique version tag
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/k8s-2tier-app:v${{ github.run_number }} .

      # 🔥 Push image with version tag
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/k8s-2tier-app:v${{ github.run_number }}

      # 🚀 Deploy new version automatically
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/k8s-2tier-app:v${{ github.run_number }}
            kubectl set image deployment/two-tier-app two-tier-app=${{ secrets.DOCKER_USERNAME }}/k8s-2tier-app:v${{ github.run_number }}
            kubectl rollout status deployment/two-tier-app
